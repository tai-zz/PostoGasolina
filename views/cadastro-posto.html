<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Posto</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <button id="themeToggle" class="theme-toggle secundario" type="button">Modo escuro</button>
  <div class="layout">
    <aside class="sidebar">
      <h2>Sistema Posto</h2>
      <button type="button" onclick="window.location.href='dashboard.html'">Dashboard</button>
    </aside>

    <main class="conteudo">
      <h1>Cadastro de Posto</h1>

      <div class="formulario">
        <input type="text" id="nome" placeholder="Nome do posto">
        <input type="text" id="cnpj" placeholder="CNPJ">
        <input type="text" id="endereco" placeholder="Endereco">
        <input type="text" id="bairro" placeholder="Bairro">
        <input type="text" id="cidade" placeholder="Cidade">
        <input type="text" id="estado" placeholder="UF">

        <div class="acoes">
          <button id="btnCadastrarPosto" type="button">Cadastrar</button>
          <button class="secundario" type="button" onclick="window.location.href='dashboard.html'">Voltar</button>
        </div>

        <p id="mensagem" class="mensagem"></p>
      </div>
    </main>
  </div>

  <script src="../controller/cadastroPostoController.js"></script>
  <script src="../controller/themeController.js"></script>
</body>
</html>
